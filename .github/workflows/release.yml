name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Environment Info
        run: |
          sw_vers
          xcodebuild -version
          xcrun --show-sdk-path
          xcrun --show-sdk-version

      - name: Build
        run: |
          xcodebuild build \
            -project CascViewer.xcodeproj \
            -scheme CascViewer \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM=""

      - name: Run Smoke Test on Runner
        run: |
          APP="build/DerivedData/Build/Products/Release/CascViewer.app"
          echo "Launching app..."
          open "$APP"
          sleep 5
          echo "Quitting app..."
          osascript -e 'tell application "CascViewer" to quit' || true
          sleep 2
          echo "Checking for crash reports..."
          ls -lt ~/Library/Logs/DiagnosticReports/ 2>/dev/null | head -5 || true

      - name: Package
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/CascViewer.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"
            exit 1
          fi
          mkdir -p dist
          ditto -c -k --keepParent "$APP_PATH" "dist/CascViewer-macOS.zip"
          ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CascViewer-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
